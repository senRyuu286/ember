name: ember
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  dio: ^5.9.2
  drift: ^2.32.1
  flutter:
    sdk: flutter
  flutter_form_builder: ^10.3.0+2
  flutter_riverpod: ^3.3.1
  flutter_secure_storage: ^10.0.0
  form_builder_validators: ^11.3.0
  go_router: ^17.2.0
  path: ^1.9.1
  path_provider: ^2.1.5
  riverpod_annotation: ^4.0.2
  sqlite3: ^3.2.0
  supabase_flutter: ^2.12.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^4.0.3
  drift_dev: ^2.32.1
  build_runner: ^2.13.1

# TODO: Remove once riverpod_generator supports analyzer ^10.0.0 (needed by drift_dev ^2.32.1)
dependency_overrides:
  analyzer: ^10.0.0

flutter:
  uses-material-design: true
